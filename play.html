<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle Player</title>
    <style>
        :root { --accent: #00d4ff; --text-color: #ffffff; --scale: 1; --blur: 0px; }
        body { 
            margin: 0; padding: 0; background: #0a192f; color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; background-size: cover; background-position: center;
        }
        .bg-overlay { position: fixed; top:0; left:0; right:0; bottom:0; backdrop-filter: blur(var(--blur)); z-index: -1; }
        .neon-text { text-shadow: 0 0 15px var(--text-color); }
        
        #startScreen {
            background: rgba(10, 25, 47, 0.95); border: 2px solid var(--accent);
            border-radius: 20px; padding: 40px; text-align: center; max-width: 80%;
            z-index: 100; box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        #gameScreen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; height: 100%; padding-top: 20px; }
        #statBar { margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; text-align: center; }
        
        .grid-wrapper { 
            display: flex; justify-content: center; align-items: center;
            transform: scale(var(--scale)); transform-origin: top center;
            flex-grow: 1; width: 100%;
        }
        .grid-container { display: grid; gap: 10px; padding: 20px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--accent); border-radius: 15px; }
        .cell { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; transition: 0.2s; font-size: 2rem; }
        .cell:hover { background: rgba(255, 255, 255, 0.1); }
        .cell img { width: 80%; height: 80%; object-fit: contain; }
        .header-cell { border: none; background: none; font-weight: bold; color: var(--text-color); cursor: default; font-size: 1.1rem; }
        
        button#startBtn { background: var(--accent); color: #0a192f; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button#startBtn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }
        
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center; }
        .modal-content { background:#0a192f; border:3px solid var(--accent); padding:30px; border-radius:20px; text-align:center; width:350px; box-shadow: 0 0 25px var(--accent); }
        .modal-content input { width:100%; padding:12px; margin:20px 0; border-radius:10px; border:2px solid var(--accent); background:#000; color:#fff; text-align:center; font-size:1.1rem; box-sizing:border-box; }
        .modal-content button { background:var(--accent); color:#0a192f; border:none; padding:12px 30px; border-radius:10px; font-weight:bold; cursor:pointer; width:100%; }

        #winScreen { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(10,25,47,0.95); border:3px solid var(--accent); padding:30px; border-radius:20px; text-align:center; z-index:1000; box-shadow: 0 0 30px var(--accent); }
        
        /* Стиль для попадания робота — синяя подсветка, как ты просил */
        .pc-hit-style { border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent); }
    </style>
</head>
<body>
    <div id="modalOverlay"><div class="modal-content" id="modalBox"><h3 id="modalPrompt">Введите ответ</h3><div id="modalTask" style="color:var(--accent); font-weight:bold; font-size:1.4rem; margin-bottom:10px;"></div><input type="text" id="userAnswer" placeholder="Напишите здесь..." autocomplete="off"><button onclick="checkModalAnswer()">ВЫСТРЕЛИТЬ!</button></div></div>
    <div class="bg-overlay"></div>
    <div id="startScreen"><h1 id="titleDisp" class="neon-text">МОРСКОЙ БОЙ</h1><div id="teamSetup" style="display:none; margin-bottom:20px;"></div><button id="startBtn" onclick="startGame()">ИГРАТЬ</button></div>
    <div id="gameScreen"><div id="turnInfo" style="color:var(--accent); margin-bottom:10px; font-weight:bold; font-size: 1.2rem;"></div><div id="statBar"></div><div class="grid-wrapper"><div id="grid" class="grid-container"></div></div></div>
    <div id="winScreen"><h2 id="winText" class="neon-text">ПОБЕДА!</h2><div id="winImgContainer"></div><button onclick="location.reload()" id="startBtn" style="padding:10px 20px; font-size:0.9rem;">ИГРАТЬ СНОВА</button></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let cfg = { t: "МОРСКОЙ БОЙ", x: [], y: [], c: "#00d4ff", s: 3, zoom: 1, fColor: "#ffffff", bg: "", blur: 0, winT: "ПОБЕДА!", winI: "", mode: "classic", answers: "", challengeLimit: 30, challengeType: "time", gameType: "solo", teamCount: 2 };
        if (urlParams.has('data')) { try { cfg = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data'))))); } catch(e) { console.error("Ошибка загрузки"); } }

        const root = document.documentElement;
        root.style.setProperty('--accent', cfg.c);
        root.style.setProperty('--text-color', cfg.fColor);
        root.style.setProperty('--scale', cfg.zoom || 1);
        root.style.setProperty('--blur', (cfg.blur || 0) + "px");

        if (cfg.bg?.startsWith('http')) document.body.style.backgroundImage = `url('${cfg.bg}')`;
        else if (cfg.bg) document.body.style.background = cfg.bg;
        document.getElementById('titleDisp').innerText = cfg.t;

        let found = 0, currentTeam = 0, teams = [], timerInterval, gameOver = false;
        let pcFound = 0, isPlayerTurn = true;
        let timeLeft = parseInt(cfg.challengeLimit) || 30;
        let movesLeft = parseInt(cfg.challengeLimit) || 30;
        const targets = new Set(), openedCells = new Set();
        const ansMap = cfg.answers ? cfg.answers.split('\n').map(a => a.trim().toLowerCase()) : [];
        let currentAttemptIdx = null, currentAttemptCell = null;
        let cellElements = {};

        function startGame() {
            if (cfg.gameType === 'team') {
                teams = [];
                for(let i=1; i<=cfg.teamCount; i++) {
                    const el = document.getElementById(`tName${i}`);
                    teams.push({ name: (el && el.value) ? el.value : `Команда ${i}`, score: 0 });
                }
            }
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            initGrid();
            if (cfg.mode === 'challenge' && cfg.challengeType === 'time') {
                timerInterval = setInterval(() => { timeLeft--; updateStats(); if (timeLeft <= 0) endGame(false); }, 1000);
            }
            updateStats();
        }

        function updateStats() {
            let text = `Вы: ${found} | Робот: ${pcFound} (из ${cfg.s})`;
            if (cfg.mode !== 'computer') text = `Найдено: ${found} / ${cfg.s}`;
            if (cfg.mode === 'challenge') text += cfg.challengeType === 'time' ? ` | Время: ${timeLeft}с` : ` | Ходов: ${movesLeft}`;
            document.getElementById('statBar').innerText = text;
            const turnDisplay = document.getElementById('turnInfo');
            turnDisplay.innerText = isPlayerTurn ? "ВАШ ХОД" : "ХОД РОБОТА...";
        }

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, auto)`;
            const total = cfg.x.length * cfg.y.length;
            while(targets.size < Math.min(cfg.s, total)) { targets.add(Math.floor(Math.random() * total)); }
            for (let r = 0; r <= cfg.y.length; r++) {
                for (let c = 0; c <= cfg.x.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 0 || c === 0) {
                        cell.className += ' header-cell';
                        if (r === 0 && c > 0) cell.innerText = cfg.x[c-1];
                        if (c === 0 && r > 0) cell.innerText = cfg.y[r-1];
                    } else {
                        const idx = (r-1) * cfg.x.length + (c-1);
                        cellElements[idx] = cell;
                        cell.onclick = () => handleMove(idx, cell, cfg.x[c-1], cfg.y[r-1]);
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function handleMove(idx, cell, valX, valY) {
            if (gameOver || openedCells.has(idx) || !isPlayerTurn) return;
            if (cfg.mode === 'writing') {
                currentAttemptIdx = idx; currentAttemptCell = cell;
                document.getElementById('modalOverlay').style.display = 'flex';
                document.getElementById('modalTask').innerText = `${valX} + ${valY}`;
                document.getElementById('userAnswer').value = ''; document.getElementById('userAnswer').focus();
            } else { 
                processCell(idx, cell); 
                if (!gameOver) finalizeTurn(); 
            }
        }

        function checkModalAnswer() {
            if (document.getElementById('userAnswer').value.trim().toLowerCase() === (ansMap[currentAttemptIdx] || "").toLowerCase()) {
                document.getElementById('modalOverlay').style.display = 'none';
                processCell(currentAttemptIdx, currentAttemptCell); 
                if (!gameOver) finalizeTurn();
            } else {
                const box = document.getElementById('modalBox'); box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 400);
            }
        }

        function processCell(idx, cell) {
            openedCells.add(idx);
            if (targets.has(idx)) {
                // Всегда показываем корабль, даже если нашел робот
                cell.innerHTML = cfg.targetImg ? `<img src="${cfg.targetImg}">` : "🚢";
                cell.style.background = "rgba(0, 212, 255, 0.4)";
                found++; 
                updateStats();
                if (found >= cfg.s) {
                    setTimeout(() => endGame(true), 500);
                }
                return true;
            } else {
                cell.innerHTML = "✕"; cell.style.opacity = "0.4";
                return false;
            }
        }

        function finalizeTurn() {
            if (gameOver) return;
            if (cfg.mode === 'computer') { 
                isPlayerTurn = false; 
                updateStats();
                setTimeout(computerTurn, 1000); 
            }
        }

        function computerTurn() {
            if (gameOver) return;

            // Находим все действительно НЕ открытые клетки
            let available = [], empty = [];
            for (let i = 0; i < cfg.x.length * cfg.y.length; i++) {
                if (!openedCells.has(i)) {
                    available.push(i);
                    if (!targets.has(i)) empty.push(i);
                }
            }

            if (available.length === 0) return;

            // ЛОГИКА ПОДДАВАНИЯ:
            // Если роботу остался 1 корабль до победы, он специально выбирает пустую клетку
            let shot;
            if (pcFound === cfg.s - 1 && empty.length > 0) {
                shot = empty[Math.floor(Math.random() * empty.length)];
            } else {
                shot = available[Math.floor(Math.random() * available.length)];
            }
            
            openedCells.add(shot);
            const cell = cellElements[shot];
            
            if (targets.has(shot)) {
                // Робот нашел корабль
                cell.innerHTML = cfg.targetImg ? `<img src="${cfg.targetImg}">` : "🚢";
                cell.classList.add('pc-hit-style'); // Синяя подсветка для робота
                pcFound++;
                updateStats();
                
                if (pcFound >= cfg.s) {
                    endGame(false, "РОБОТ ВЫИГРАЛ!"); 
                } else {
                    // Если попал — ходит СНОВА
                    setTimeout(computerTurn, 1000); 
                }
            } else {
                // Робот промахнулся
                cell.innerHTML = "✕"; 
                cell.style.opacity = "0.4";
                isPlayerTurn = true; 
                updateStats();
            }
        }

        function endGame(isWin, msg) {
            gameOver = true; if (timerInterval) clearInterval(timerInterval);
            document.getElementById('winText').innerText = isWin ? (cfg.winT || "ПОБЕДА!") : (msg || "ИГРА ОКОНЧЕНА");
            if (cfg.winI) document.getElementById('winImgContainer').innerHTML = `<img src="${cfg.winI}" style="max-width:200px; margin-top:15px; border-radius:10px;">`;
            document.getElementById('winScreen').style.display = 'block';
        }

        document.getElementById('userAnswer').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkModalAnswer(); });
    </script>
</body>
</html>
