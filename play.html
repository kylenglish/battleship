<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle Ultimate</title>
    <link id="fontLink" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; --bg: #0a192f; --text-color: white; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; background-size: cover; background-position: center;
        }
        
        #startScreen {
            background: rgba(10, 25, 47, 0.95); border: 2px solid var(--accent);
            border-radius: 20px; padding: 40px; text-align: center; max-width: 85%;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); z-index: 10;
        }
        .neon-text { text-shadow: 0 0 10px var(--accent); }
        h1 { color: var(--accent); font-size: 2.5rem; margin-top: 0; }
        
        #gameScreen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; }
        
        .grid-container { 
            display: grid; gap: 5px; padding: 10px;
            background: rgba(0, 0, 0, 0.3); border: 2px solid var(--accent); border-radius: 12px;
        }
        
        .cell { 
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 5px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            position: relative; transition: 0.2s; overflow: hidden;
        }
        .cell img { width: 90%; height: 90%; object-fit: contain; }
        .header-cell { border: none; background: none; font-weight: bold; color: var(--accent); cursor: default; }

        #writingInput { 
            display: none; position: absolute; bottom: 20px; 
            background: var(--bg); border: 2px solid var(--accent); padding: 15px; border-radius: 10px;
        }
        input { background: none; border: 1px solid var(--accent); color: white; padding: 5px; margin-right: 5px; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1 id="titleDisp" class="neon-text">МОРСКОЙ БОЙ</h1>
        <div id="instr" style="text-align:left; margin-bottom:20px;"></div>
        <button id="startBtn" style="padding:15px 40px; cursor:pointer;">ИГРАТЬ</button>
    </div>

    <div id="gameScreen">
        <div id="statBar" style="margin-bottom:10px; font-weight:bold;"></div>
        <div id="grid" class="grid-container"></div>
    </div>

    <div id="writingInput">
        <span id="targetPrompt"></span>: <input type="text" id="answerField"> <button onclick="checkWriting()">OK</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let cfg = { 
            t: "Sea Battle", x: [], y: [], c: "#00d4ff", s: 3, 
            targetImg: "", font: "PT Sans", bg: "", 
            mode: "classic", neon: true, fSize: "14", fColor: "#ffffff"
        };

        if (urlParams.has('data')) {
            try { cfg = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data'))))); } catch(e) {}
        }

        // Применение стилей
        const root = document.documentElement;
        root.style.setProperty('--accent', cfg.c);
        root.style.setProperty('--text-color', cfg.fColor);
        if (cfg.bg.startsWith('http')) document.body.style.backgroundImage = `url('${cfg.bg}')`;
        else if (cfg.bg) root.style.setProperty('--bg', cfg.bg);
        
        document.getElementById('titleDisp').innerText = cfg.t;
        document.getElementById('fontLink').href = `https://fonts.googleapis.com/css2?family=${cfg.font.replace(/ /g, '+')}&display=swap`;
        document.body.style.fontFamily = `'${cfg.font}', sans-serif`;
        document.body.style.fontSize = cfg.fSize + "px";

        let found = 0;
        let pendingCell = null;
        const targets = new Set();
        const totalCells = cfg.x.length * cfg.y.length;
        while(targets.size < Math.min(cfg.s, totalCells)) targets.add(Math.floor(Math.random() * totalCells));

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, auto)`;
            
            for (let r = 0; r <= cfg.y.length; r++) {
                for (let c = 0; c <= cfg.x.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (r === 0 && c === 0) cell.className += ' header-cell';
                    else if (r === 0) renderHeader(cell, cfg.x[c-1]);
                    else if (c === 0) renderHeader(cell, cfg.y[r-1]);
                    else {
                        const idx = (r-1) * cfg.x.length + (c-1);
                        cell.onclick = () => handleMove(cell, idx, cfg.x[c-1], cfg.y[r-1]);
                    }
                    grid.appendChild(cell);
                }
            }
        }

        function renderHeader(cell, val) {
            cell.className += ' header-cell';
            if (val.startsWith('http')) cell.innerHTML = `<img src="${val}">`;
            else cell.innerText = val;
            if (cfg.neon) cell.className += ' neon-text';
        }

        function handleMove(cell, idx, xVal, yVal) {
            if (cell.innerHTML || cell.classList.contains('miss')) return;
            if (cfg.mode === 'writing') {
                pendingCell = {cell, idx};
                document.getElementById('writingInput').style.display = 'block';
                document.getElementById('targetPrompt').innerText = `${xVal} + ${yVal}`;
            } else {
                reveal(cell, idx);
            }
        }

        function reveal(cell, idx) {
            if (targets.has(idx)) {
                cell.style.background = 'rgba(0,212,255,0.2)';
                if (cfg.targetImg) cell.innerHTML = `<img src="${cfg.targetImg}">`;
                else cell.innerHTML = "🚢";
                found++;
                updateStats();
                if (found >= cfg.s) alert("Победа!");
            } else {
                cell.className += ' miss';
                cell.innerHTML = "✕";
            }
        }

        function checkWriting() {
            if (document.getElementById('answerField').value.length > 2) {
                document.getElementById('writingInput').style.display = 'none';
                reveal(pendingCell.cell, pendingCell.idx);
                document.getElementById('answerField').value = '';
            }
        }

        function updateStats() { document.getElementById('statBar').innerText = `Найденные цели: ${found} / ${cfg.s}`; }

        document.getElementById('startBtn').onclick = () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            updateStats();
        };

        createGrid();
    </script>
</body>
</html>
