<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle Player</title>
    <style>
        :root { --accent: #00d4ff; --text-color: #ffffff; --scale: 1; --blur: 0px; }
        body { 
            margin: 0; padding: 0; background: #0a192f; color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden; background-size: cover; background-position: center;
        }
        .bg-overlay { position: fixed; top:0; left:0; right:0; bottom:0; backdrop-filter: blur(var(--blur)); z-index: -1; }
        .neon-text { text-shadow: 0 0 15px var(--text-color); }
        .neon-border { box-shadow: 0 0 15px var(--accent); border-color: var(--accent) !important; }
        #startScreen {
            background: rgba(10, 25, 47, 0.95); border: 2px solid var(--accent);
            border-radius: 20px; padding: 40px; text-align: center; max-width: 80%;
            z-index: 100; transition: 0.3s;
        }
        #gameScreen { display: none; flex-direction: column; align-items: center; justify-content: flex-start; width: 100%; height: 100%; padding-top: 20px; }
        #statBar { margin-bottom: 20px; font-weight: bold; font-size: 1.2rem; text-align: center; }
        .grid-wrapper { 
            display: flex; justify-content: center; align-items: center;
            transform: scale(var(--scale)); 
            transform-origin: top center;
            flex-grow: 1; width: 100%;
        }
        .grid-container { display: grid; gap: 10px; padding: 20px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--accent); border-radius: 15px; }
        .cell { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .cell img { width: 80%; height: 80%; object-fit: contain; }
        .header-cell { border: none; background: none; font-weight: bold; color: var(--text-color); cursor: default; }
        button#startBtn { background: var(--accent); color: #0a192f; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        #winScreen { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(10,25,47,0.95); border:3px solid var(--accent); padding:30px; border-radius:20px; text-align:center; z-index:1000; box-shadow:0 0 30px var(--accent); }
        #winScreen img { max-width: 200px; margin-top: 15px; border-radius: 10px; }
        .turn-indicator { color: var(--accent); margin-bottom: 10px; font-size: 1.1rem; }
        /* Красивое модальное окно */
#modalOverlay { 
    display:none; 
    position:fixed; 
    top:0; left:0; 
    width:100%; height:100%; 
    background:rgba(0,0,0,0.85); 
    z-index:2000; 
    align-items:center; 
    justify-content:center; 
}
.modal-content { 
    background:#0a192f; 
    border:3px solid var(--accent); 
    padding:30px; 
    border-radius:20px; 
    text-align:center; 
    width:350px; 
    box-shadow:0 0 20px var(--accent); 
}
.modal-content h3 { 
    margin-top:0; 
    color:var(--text-color); 
}
.modal-content input { 
    width:100%; 
    padding:12px; 
    margin:20px 0; 
    border-radius:10px; 
    border:2px solid var(--accent); 
    background:#000; 
    color:#fff; 
    text-align:center; 
    font-size:1.1rem; 
    box-sizing:border-box; 
    transition: 0.3s; 
}
.modal-content button { 
    background:var(--accent); 
    color:#0a192f; 
    border:none; 
    padding:12px 30px; 
    border-radius:10px; 
    font-weight:bold; 
    cursor:pointer; 
    width:100%; 
    font-size:1rem; 
}

/* Анимация ошибки */
.shake { 
    animation: shake 0.4s; 
    border-color: #ff4d4d !important; 
    background: rgba(255, 77, 77, 0.2) !important; 
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
}
    </style>
</head>
<body>
    <div id="modalOverlay">
        <div class="modal-content" id="modalBox">
            <h3 id="modalPrompt">Составь предложение</h3>
            <div id="modalTask" style="color:var(--accent); font-weight:bold; font-size:1.2rem; margin-bottom:10px;"></div>
            <input type="text" id="userAnswer" placeholder="Напишите здесь..." autocomplete="off">
            <button onclick="checkModalAnswer()">ВЫСТРЕЛИТЬ!</button>
        </div>
    </div>
    <div class="bg-overlay"></div>
    
    <div class="bg-overlay"></div>
    <div id="startScreen">
        <h1 id="titleDisp">МОРСКОЙ БОЙ</h1>
        <div id="teamSetup" style="display:none; margin-bottom:20px;"></div>
        <button id="startBtn" onclick="startGame()">ИГРАТЬ</button>
    </div>

    <div id="gameScreen">
        <div id="turnInfo" class="turn-indicator"></div>
        <div id="statBar"></div>
        <div class="grid-wrapper"><div id="grid" class="grid-container"></div></div>
    </div>

    <div id="winScreen">
        <h2 id="winText" class="neon-text">ПОБЕДА!</h2>
        <div id="winImgContainer"></div>
        <button onclick="location.reload()" id="startBtn" style="padding:10px 20px; font-size:0.9rem;">ИГРАТЬ СНОВА</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let cfg = { t: "Sea Battle", x: [], y: [], c: "#00d4ff", s: 3, zoom: 1, neonT: true, neonB: true, fColor: "#ffffff", bg: "", blur: 0, winT: "ПОБЕДА!", winI: "", mode: "classic", answers: "", challengeLimit: 30, challengeType: "time", gameType: "solo", teamCount: 2 };
        
        if (urlParams.has('data')) { try { cfg = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data'))))); } catch(e) {} }

        const root = document.documentElement;
        root.style.setProperty('--accent', cfg.c);
        root.style.setProperty('--text-color', cfg.fColor);
        root.style.setProperty('--scale', cfg.zoom || 1);
        root.style.setProperty('--blur', (cfg.blur || 0) + "px");

        if (cfg.bg?.startsWith('http')) { document.body.style.backgroundImage = `url('${cfg.bg}')`; } 
        else if (cfg.bg) { document.body.style.background = cfg.bg; }

        document.getElementById('titleDisp').innerText = cfg.t;
        if (cfg.gameType === 'team') {
            const setup = document.getElementById('teamSetup');
            setup.style.display = 'block';
            setup.innerHTML = '<p>Введите названия команд:</p>';
            for(let i=1; i<=cfg.teamCount; i++) {
                setup.innerHTML += `<input type="text" id="tName${i}" value="Команда ${i}" style="margin:5px; padding:5px; border-radius:5px; border:1px solid var(--accent); background:#000; color:#fff;"><br>`;
            }
        }

        let found = 0;
        let timeLeft = cfg.challengeLimit;
        let movesLeft = cfg.challengeLimit;
        let currentTeam = 0;
        let teams = [];
        let timerInterval;
        let gameOver = false;
        const targets = new Set();
        const openedCells = new Set();
        // Теперь разделяем не по запятой, а по переносу строки \n
const ansMap = cfg.answers ? cfg.answers.split('\n').map(a => a.trim().toLowerCase()) : [];
let currentAttemptIdx = null;
let currentAttemptCell = null;

        function startGame() {
            if (cfg.gameType === 'team') {
                for(let i=1; i<=cfg.teamCount; i++) {
                    teams.push({ name: document.getElementById(`tName${i}`).value, score: 0 });
                }
            }
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            initGrid();
            if (cfg.mode === 'challenge' && cfg.challengeType === 'time') {
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateStats();
                    if (timeLeft <= 0) endGame(false);
                }, 1000);
            }
            updateStats();
        }

        function updateStats() {
            let text = `Найдено: ${found} / ${cfg.s}`;
            if (cfg.mode === 'challenge') {
                text += cfg.challengeType === 'time' ? ` | Время: ${timeLeft}с` : ` | Ходов: ${movesLeft}`;
            }
            document.getElementById('statBar').innerText = text;
            if (cfg.gameType === 'team') {
                document.getElementById('turnInfo').innerText = `Ход: ${teams[currentTeam].name}`;
            }
        }

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, auto)`;
            const total = cfg.x.length * cfg.y.length;
            while(targets.size < Math.min(cfg.s, total)) targets.add(Math.floor(Math.random() * total));

            for (let r = 0; r <= cfg.y.length; r++) {
                for (let c = 0; c <= cfg.x.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = (r === 0) ? cfg.x[c-1] : (c === 0 ? cfg.y[r-1] : null);
                    if (r === 0 && c === 0) cell.className += ' header-cell';
                    else if (val !== null) {
                        cell.className += ' header-cell';
                        if (val.startsWith('http')) cell.innerHTML = `<img src="${val}">`;
                        else cell.innerText = val;
                    } else {
                        const idx = (r-1) * cfg.x.length + (c-1);
                        cell.onclick = () => handleMove(idx, cell);
                    }
                    grid.appendChild(cell);
                }
            }
        }

    function handleMove(idx, cell) {
    if (gameOver || openedCells.has(idx)) return;

    if (cfg.mode === 'writing') {
        currentAttemptIdx = idx;
        currentAttemptCell = cell;
        
        // Показываем модальное окно
        document.getElementById('modalOverlay').style.display = 'flex';
        document.getElementById('userAnswer').value = '';
        document.getElementById('userAnswer').focus();
        
        // Выводим подсказку, что с чем соединить
        const r = Math.floor(idx / cfg.x.length);
        const c = idx % cfg.x.length;
        document.getElementById('modalTask').innerText = `${cfg.y[r]} + ${cfg.x[c]}`;
        return; 
    }
    processCell(idx, cell);
    finalizeTurn();
}

// Новая функция проверки ответа в красивом окне
function checkModalAnswer() {
    const inp = document.getElementById('userAnswer');
    const box = document.getElementById('modalBox');
    const val = inp.value.trim().toLowerCase();
    const correct = ansMap[currentAttemptIdx] || "";

    if (val === correct) {
        document.getElementById('modalOverlay').style.display = 'none';
        processCell(currentAttemptIdx, currentAttemptCell);
        finalizeTurn();
    } else {
        // Эффект ошибки (тряска и звук)
        box.classList.add('shake');
        const audio = new Audio('https://www.soundjay.com/buttons/sounds/beep-05.mp3');
        audio.play();
        setTimeout(() => box.classList.remove('shake'), 400);
    }
}

// Логика завершения хода
function finalizeTurn() {
    if (cfg.mode === 'challenge' && cfg.challengeType === 'moves') {
        movesLeft--;
        if (movesLeft <= 0 && found < cfg.s) endGame(false);
    }
    if (!gameOver && cfg.mode === 'computer') {
        setTimeout(computerMove, 600);
    } else if (cfg.gameType === 'team') {
        currentTeam = (currentTeam + 1) % teams.length;
    }
    updateStats();
}

            processCell(idx, cell);

            if (cfg.mode === 'challenge' && cfg.challengeType === 'moves') {
                movesLeft--;
                if (movesLeft <= 0 && found < cfg.s) endGame(false);
            }

            if (!gameOver && cfg.mode === 'computer') {
                setTimeout(computerMove, 600);
            } else if (cfg.gameType === 'team') {
                currentTeam = (currentTeam + 1) % teams.length;
            }
            updateStats();
        }

        function processCell(idx, cell) {
            openedCells.add(idx);
            if (targets.has(idx)) {
                cell.innerHTML = cfg.targetImg ? `<img src="${cfg.targetImg}">` : "🚢";
                found++;
                if (cfg.gameType === 'team') teams[currentTeam].score++;
                if (found >= cfg.s) endGame(true);
            } else {
                cell.innerHTML = "✕"; cell.style.opacity = "0.4";
            }
        }

     function computerMove() {
    const total = cfg.x.length * cfg.y.length;
    let randIdx;
    // Компьютер ищет случайную еще не открытую клетку
    do { randIdx = Math.floor(Math.random() * total); } while (openedCells.has(randIdx));
    
    // Находим все игровые клетки (пропуская заголовки)
    const cells = document.querySelectorAll('.cell:not(.header-cell)');
    
    // Делаем выстрел
    processCell(randIdx, cells[randIdx]);
    
    // Завершаем ход (это обновит статистику и вернет ход игроку)
    finalizeTurn(); 
}

        function endGame(isWin) {
            gameOver = true;
            clearInterval(timerInterval);
            const ws = document.getElementById('winScreen');
            let winMsg = isWin ? (cfg.winT || "ПОБЕДА!") : "ВРЕМЯ/ХОДЫ ВЫШЛИ!";
            if (cfg.gameType === 'team') {
                const winner = [...teams].sort((a,b) => b.score - a.score)[0];
                winMsg = `Победила команда: ${winner.name}!`;
            }
            document.getElementById('winText').innerText = winMsg;
            if(cfg.winI) document.getElementById('winImgContainer').innerHTML = `<img src="${cfg.winI}">`;
            ws.style.display = 'block';
        }
    </script>
</body>
</html>
