<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle Player</title>
    <link id="fontLink" rel="stylesheet">
    <style>
        body { margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; background: #f0f7ff; color: #333; height: 100vh; overflow: hidden; }
        h1 { margin: 5px 0; font-size: 1.2rem; }
        .grid-container { display: grid; gap: 2px; margin-top: 10px; background: #ccc; border: 2px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .cell { width: 60px; height: 60px; background: white; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; text-align: center; padding: 2px; overflow: hidden; word-break: break-word; }
        .cell:hover { background: #e0f7fa; }
        .cell.hit { background: #ff5252; color: white; position: relative; }
        .cell.miss { background: #cfd8dc; }
        /* Стиль для кастомной картинки внутри клетки */
        .target-icon { width: 80%; height: 80%; object-fit: contain; }
        .hit-mark { position: absolute; font-size: 2rem; color: white; line-height: 0; pointer-events: none; }
    </style>
</head>
<body>
    <h1 id="gameTitle">Sea Battle</h1>
    <div id="grid" class="grid-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let config = { title: "Sea Battle", x: [], y: [], color: "#00d4ff", ships: 3, targetImg: "", font: "PT Sans", lang: "en" };

        // Тексты интерфейса
        const i18n = {
            ru: { win: "Победа! Все цели найдены." },
            en: { win: "Victory! All targets found." },
            fr: { win: "Victoire! Toutes les cibles trouvées." },
            es: { win: "¡Victoria! Todos los objetivos encontrados." },
            de: { win: "Sieg! Alle Ziele gefunden." },
            zh: { win: "胜利！所有目标都找到了。" }
        };

        if (urlParams.has('data')) {
            try {
                config = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data')))));
            } catch (e) { console.error("Error parsing config"); }
        }

        // Применяем настройки
        document.getElementById('gameTitle').innerText = config.title;
        document.body.style.backgroundColor = config.color + '22'; 
        document.getElementById('fontLink').href = `https://fonts.googleapis.com/css2?family=${config.font.replace(/ /g, '+')}&display=swap`;
        document.body.style.fontFamily = `'${config.font}', sans-serif`;

        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${config.x.length}, 60px)`;
        
        let found = 0;
        const total = config.ships;
        const targets = new Set();
        while(targets.size < total) {
            targets.add(Math.floor(Math.random() * (config.x.length * config.y.length)));
        }

        for (let i = 0; i < config.y.length * config.x.length; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const row = Math.floor(i / config.x.length);
            const col = i % config.x.length;
            cell.innerText = `${config.x[col]}\n${config.y[row]}`;

            cell.onclick = () => {
                if (cell.classList.contains('hit') || cell.classList.contains('miss')) return;
                
                if (targets.has(i)) {
                    cell.classList.add('hit');
                    cell.innerText = ''; // Очищаем текст при попадании
                    
                    // Если есть своя картинка - вставляем её, если нет - рисуем стандартный крестик
                    if (config.targetImg) {
                        const img = document.createElement('img');
                        img.src = config.targetImg;
                        img.className = 'target-icon';
                        cell.appendChild(img);
                    } else {
                        cell.innerHTML = '<span class="hit-mark">✕</span>';
                    }

                    found++;
                    if (found === total) {
                        setTimeout(() => alert(i18n[config.lang]?.win || i18n.en.win), 300);
                    }
                } else {
                    cell.classList.add('miss');
                }
            };
            grid.appendChild(cell);
        }
    </script>
</body>
</html>
