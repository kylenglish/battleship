<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle: Pro Player</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary-color: #00d4ff; --bg-color: #050b14; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle at center, #1a3a5f 0%, #050b14 100%); color: white; overflow: hidden; }
        
        #game-container { display: none; height: 100vh; flex-direction: column; align-items: center; padding-top: 20px; transition: transform 0.1s; }
        
        /* Прогресс-бар с водой */
        #progress-area { width: 100%; max-width: 500px; margin-bottom: 15px; text-align: center; }
        .water-tank { width: 100%; height: 20px; background: rgba(255,255,255,0.1); border: 2px solid var(--primary-color); border-radius: 15px; overflow: hidden; margin-top: 5px; }
        #water-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4fc3f7, #00d4ff); transition: width 0.5s ease; }

        #sea-battle-grid { display: grid; gap: 8px; background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 20px; border: 2px solid var(--primary-color); box-shadow: 0 0 20px rgba(0,212,255,0.2); }
        
        .cell { width: clamp(50px, 12vh, 90px); height: clamp(50px, 12vh, 90px); display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; font-size: 0.9rem; }
        .header-cell { background: #112240; color: var(--primary-color); font-weight: bold; border: 1px solid rgba(0,212,255,0.3); }
        .game-cell { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Эффекты попадания */
        .hit { background: #3e8e5e !important; animation: pop 0.4s ease; }
        .hit::after { content: '🚢'; font-size: 2.5rem; }
        .miss { background: #a34646 !important; opacity: 0.7; }
        .miss::after { content: '💧'; font-size: 1.5rem; }

        /* Комбо и тряска */
        #combo-meter { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 50px; border: 2px solid #f1c40f; color: #f1c40f; display: none; font-weight: bold; }
        .shake { animation: shakeAnim 0.4s both; }
        @keyframes shakeAnim { 10%, 90% {transform: translate3d(-2px,0,0);} 20%, 80% {transform: translate3d(3px,0,0);} 30%, 50%, 70% {transform: translate3d(-5px,0,0);} }
        @keyframes pop { 0% {transform: scale(0.5);} 100% {transform: scale(1);} }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #112240; padding: 30px; border-radius: 25px; border: 3px solid var(--primary-color); text-align: center; width: 85%; max-width: 450px; }
        input { width: 100%; padding: 15px; margin: 15px 0; background: #050b14; color: white; border: 2px solid var(--primary-color); border-radius: 10px; font-size: 1.2rem; text-align: center; }
        button { background: var(--primary-color); color: #000; border: none; padding: 15px 35px; cursor: pointer; font-weight: bold; border-radius: 12px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="combo-meter">🔥 COMBO X<span id="combo-val">0</span></div>

    <div id="start-screen" style="position:fixed; width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:#050b14; z-index:1000;">
        <div class="modal-content">
            <h1 id="d-title" style="color:var(--primary-color); font-size: 2.5rem; margin:0;">МОРСКОЙ БОЙ</h1>
            <p style="margin: 20px 0 30px; opacity: 0.8;">Найди все корабли, составляя предложения!</p>
            <button onclick="startGame()">ИГРАТЬ</button>
        </div>
    </div>

    <div id="game-container">
        <div id="progress-area">
            <div style="font-weight:bold;">🚢 Найдено: <span id="count">0</span> / <span id="total">0</span></div>
            <div class="water-tank"><div id="water-fill"></div></div>
        </div>
        <div id="sea-battle-grid"></div>
    </div>

    <div id="task-modal" class="overlay">
        <div class="modal-content">
            <p style="opacity:0.7; font-size:0.8rem; margin:0;">Твои слова:</p>
            <h2 id="task-prompt" style="color:var(--primary-color); margin: 5px 0 20px;"></h2>
            <div id="writing-mode">
                <input type="text" id="ans-input" placeholder="Напиши здесь..." autocomplete="off">
                <button onclick="checkWriting()">ОГОНЬ!</button>
            </div>
            <div id="classic-mode" style="display:none;">
                <button onclick="executeShot()">ВЫСТРЕЛ!</button>
            </div>
        </div>
    </div>

    <script>
        let cfg = { title: "Игра", mode: "writing", x: [], y: [], ships: 5, color: "#00d4ff" };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Загрузка данных
        const params = new URLSearchParams(window.location.search);
        if(params.has('data')) {
            try { cfg = JSON.parse(decodeURIComponent(escape(atob(params.get('data'))))); } catch(e){}
        }

        document.documentElement.style.setProperty('--primary-color', cfg.color);
        document.getElementById('d-title').innerText = cfg.title;
        document.getElementById('total').innerText = cfg.ships;

        let shipsFound = 0, gridData = [], currentShot = null, combo = 0;

        function playSound(f, type, dur) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(f, audioCtx.currentTime);
            osc.connect(g); g.connect(audioCtx.destination);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            init();
        }

        function init() {
            const grid = document.getElementById('sea-battle-grid');
            grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, 1fr)`;
            gridData = Array(cfg.y.length).fill().map(() => Array(cfg.x.length).fill(0));
            
            let p = 0;
            while(p < cfg.ships) {
                let r = Math.floor(Math.random()*cfg.y.length), c = Math.floor(Math.random()*cfg.x.length);
                if(gridData[r][c] === 0) { gridData[r][c] = 1; p++; }
            }

            grid.innerHTML = '<div></div>';
            cfg.x.forEach(t => {
                const d = document.createElement('div');
                d.className = 'cell header-cell'; d.innerText = t;
                grid.appendChild(d);
            });

            for(let r=0; r<cfg.y.length; r++) {
                const h = document.createElement('div');
                h.className = 'cell header-cell'; h.innerText = cfg.y[r];
                grid.appendChild(h);
                for(let c=0; c<cfg.x.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell game-cell';
                    cell.id = `c-${r}-${c}`;
                    cell.onclick = () => {
                        if(cell.classList.contains('hit') || cell.classList.contains('miss')) return;
                        currentShot = {r,c};
                        document.getElementById('task-prompt').innerText = `${cfg.x[c]} + ${cfg.y[r]}`;
                        document.getElementById('task-modal').style.display = 'flex';
                        document.getElementById('ans-input').focus();
                        document.getElementById('writing-mode').style.display = cfg.mode === 'writing' ? 'block' : 'none';
                        document.getElementById('classic-mode').style.display = cfg.mode === 'classic' ? 'block' : 'none';
                    };
                    grid.appendChild(cell);
                }
            }
        }

        function checkWriting() {
            if(document.getElementById('ans-input').value.trim().length > 2) {
                executeShot();
                document.getElementById('ans-input').value = "";
            } else {
                playSound(150, 'sawtooth', 0.3);
                alert("Напиши предложение полностью!");
            }
        }

        function executeShot() {
            document.getElementById('task-modal').style.display = 'none';
            const cell = document.getElementById(`c-${currentShot.r}-${currentShot.c}`);
            
            if(gridData[currentShot.r][currentShot.c] === 1) {
                cell.classList.add('hit');
                shipsFound++; combo++;
                playSound(800, 'sine', 0.4);
                if(combo >= 2) {
                    document.getElementById('combo-meter').style.display = 'block';
                    document.getElementById('combo-val').innerText = combo;
                    document.getElementById('game-container').classList.add('shake');
                    setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
                }
                updateUI();
            } else {
                cell.classList.add('miss');
                combo = 0;
                document.getElementById('combo-meter').style.display = 'none';
                playSound(200, 'sawtooth', 0.3);
            }
        }

        function updateUI() {
            document.getElementById('count').innerText = shipsFound;
            const perc = (shipsFound / cfg.ships) * 100;
            document.getElementById('water-fill').style.width = perc + '%';
            if(shipsFound >= cfg.ships) {
                confetti({ particleCount: 150, spread: 70 });
                setTimeout(() => alert("🎉 ПОБЕДА! Капитан, враг повержен!"), 500);
            }
        }
    </script>
</body>
</html>
