<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sea Battle Player</title>
    <link id="fontLink" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; --text-color: #ffffff; --scale: 1; }
        body { 
            margin: 0; padding: 0; background: #0a192f; color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; background-size: cover; background-position: center;
        }
        .neon-text { text-shadow: 0 0 10px var(--accent); }
        .grid-container { 
            display: grid; gap: 8px; padding: 15px;
            background: rgba(0, 0, 0, 0.3); border: 2px solid var(--accent); border-radius: 15px;
            transform: scale(var(--scale)); /* Управление размером */
        }
        .cell { 
            width: 80px; height: 80px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            text-align: center; font-size: 0.9rem;
        }
        .cell img { width: 85%; height: 85%; object-fit: contain; }
        .header-cell { border: none; background: none; font-weight: bold; color: var(--text-color); cursor: default; }
        #statBar { margin-bottom: 20px; font-weight: bold; color: var(--text-color); transform: scale(var(--scale)); }
    </style>
</head>
<body>
    <div id="statBar">Найденные цели: 0 / 0</div>
    <div id="grid" class="grid-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let cfg = { t: "Sea Battle", x: [], y: [], c: "#00d4ff", s: 3, targetImg: "", font: "PT Sans", bg: "", neon: true, fSize: "16", fColor: "#ffffff", zoom: 1 };

        if (urlParams.has('data')) {
            try { cfg = JSON.parse(decodeURIComponent(escape(atob(urlParams.get('data'))))); } catch(e) {}
        }

        // Применяем цвета и масштаб
        const root = document.documentElement;
        root.style.setProperty('--accent', cfg.c); // Обводка
        root.style.setProperty('--text-color', cfg.fColor); // Шрифт
        root.style.setProperty('--scale', cfg.zoom || 1); // Размер поля
        
        if (cfg.bg.startsWith('http')) document.body.style.backgroundImage = `url('${cfg.bg}')`;
        else if (cfg.bg) document.body.style.backgroundColor = cfg.bg;
        
        document.getElementById('fontLink').href = `https://fonts.googleapis.com/css2?family=${cfg.font.replace(/ /g, '+')}&display=swap`;
        document.body.style.fontFamily = `'${cfg.font}', sans-serif`;
        document.body.style.fontSize = cfg.fSize + "px";

        const grid = document.getElementById('grid');
        grid.style.gridTemplateColumns = `repeat(${cfg.x.length + 1}, auto)`;
        
        let found = 0;
        const targets = new Set();
        const totalCells = cfg.x.length * cfg.y.length;
        while(targets.size < Math.min(cfg.s, totalCells)) targets.add(Math.floor(Math.random() * totalCells));

        document.getElementById('statBar').innerText = `Найденные цели: 0 / ${cfg.s}`;
        if (cfg.neon) document.getElementById('statBar').classList.add('neon-text');

        for (let r = 0; r <= cfg.y.length; r++) {
            for (let c = 0; c <= cfg.x.length; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                const val = (r === 0) ? cfg.x[c-1] : (c === 0 ? cfg.y[r-1] : null);
                
                if (r === 0 && c === 0) {
                    cell.className += ' header-cell';
                } else if (val !== null) {
                    cell.className += ' header-cell';
                    if (cfg.neon) cell.className += ' neon-text';
                    if (val.startsWith('http')) cell.innerHTML = `<img src="${val}">`;
                    else cell.innerText = val;
                } else {
                    const idx = (r-1) * cfg.x.length + (c-1);
                    cell.onclick = () => {
                        if (cell.innerHTML || cell.classList.contains('miss')) return;
                        if (targets.has(idx)) {
                            cell.innerHTML = cfg.targetImg ? `<img src="${cfg.targetImg}">` : "🚢";
                            found++;
                            document.getElementById('statBar').innerText = `Найденные цели: ${found} / ${cfg.s}`;
                            if (found >= cfg.s) alert("Победа!");
                        } else {
                            cell.innerHTML = "✕";
                            cell.style.opacity = "0.5";
                        }
                    };
                }
                grid.appendChild(cell);
            }
        }
    </script>
</body>
</html>
