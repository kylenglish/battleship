<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор Sea Battle</title>
    <style>
        :root { --main: #00d4ff; }
        body { font-family: sans-serif; background: #0a192f; color: white; display: flex; gap: 20px; padding: 20px; margin: 0; height: 100vh; }
        .panel { width: 380px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--main); overflow-y: auto; }
        .preview { flex-grow: 1; background: #000; border-radius: 15px; overflow: hidden; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #aaa; }
        input, select, textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #333; background: #1a2a3a; color: white; margin-top: 5px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .check-group { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px; }
        .check-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .check-row input { width: auto; margin: 0; }
        button { width: 100%; padding: 12px; background: var(--main); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        #copyStatus { color: #00ff00; font-size: 0.8rem; text-align: center; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:var(--main); text-align:center; margin-top:0;">Редактор "Морской бой"</h2>
    <label>Заголовок игры:</label>
    <input type="text" id="t" value="МОРСКОЙ БОЙ" oninput="update()">
    
    <div class="row">
        <div style="flex:1"><label>Цвет обводки:</label><input type="color" id="c" value="#00d4ff" oninput="update()"></div>
        <div style="flex:1"><label>Цвет текста:</label><input type="color" id="fColor" value="#ffffff" oninput="update()"></div>
    </div>

    <div class="check-group">
        <div class="check-row"><input type="checkbox" id="neonT" checked onchange="update()"><label style="margin:0">неон для текста</label></div>
        <div class="check-row"><input type="checkbox" id="neonB" checked onchange="update()"><label style="margin:0">неон для обводки</label></div>
    </div>

    <label>Масштаб поля:</label>
    <input type="range" id="zoom" min="0.4" max="1.5" step="0.05" value="1" oninput="update(true)">
    
    <label>Настройка фона (URL, цвет или градиент):</label>
    <input type="text" id="bg" placeholder="URL, #цвет или linear-gradient(...)" oninput="update()">
    
    <label>Размытие фона:</label>
    <input type="range" id="blur" min="0" max="20" step="1" value="0" oninput="update()">
    
    <label>Слова или url картинки по горизонтали (через запятую):</label>
    <textarea id="x" rows="2" oninput="update()">I, You, She, We, They</textarea>
    
    <label>Слова или url картинки по вертикали (через запятую):</label>
    <textarea id="y" rows="2" oninput="update()">play, go, sleep</textarea>
    
    <label>Кол-во объектов и URL картинки объекта (пусто = корабли):</label>
    <div class="row">
        <input type="number" id="s" value="3" style="width:60px" oninput="update()">
        <input type="text" id="targetImg" placeholder="URL картинки объекта" oninput="update()">
    </div>
    
    <label>Финальный фидбек (текст и URL фото - при желании):</label>
    <input type="text" id="winT" value="ПОБЕДА!" oninput="update()">
    <input type="text" id="winI" placeholder="URL картинки финала" oninput="update()">
    
    <button onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
    <div id="copyStatus">Код скопирован в буфер обмена!</div>
    <textarea id="resCode" rows="3" style="margin-top:10px; font-size:0.7rem; color:#888;" readonly></textarea>
</div>

<div class="preview" id="previewContainer"></div>

<script>
    function getData() {
        return {
            t: document.getElementById('t').value,
            x: document.getElementById('x').value.split(',').map(s => s.trim()),
            y: document.getElementById('y').value.split(',').map(s => s.trim()),
            c: document.getElementById('c').value,
            s: parseInt(document.getElementById('s').value),
            targetImg: document.getElementById('targetImg').value,
            neonT: document.getElementById('neonT').checked,
            neonB: document.getElementById('neonB').checked,
            fColor: document.getElementById('fColor').value,
            zoom: document.getElementById('zoom').value,
            bg: document.getElementById('bg').value,
            blur: document.getElementById('blur').value,
            winT: document.getElementById('winT').value,
            winI: document.getElementById('winI').value
        };
    }
    function update(isPreviewMode = false) {
        const data = btoa(unescape(encodeURIComponent(JSON.stringify(getData()))));
        // Используем относительный путь, чтобы не зависеть от домена в редакторе
        let url = `play.html?data=${data}`;
        if(isPreviewMode) url += "&preview=true";
        document.getElementById('previewContainer').innerHTML = `<iframe src="${url}"></iframe>`;
        
        // Обновляем текстовое поле с кодом сразу
        const fullUrl = `https://kylenglish.github.io/battleship/play.html?data=${data}`;
        document.getElementById('resCode').value = `<iframe src="${fullUrl}" width="100%" height="600px" style="border:0;" allowfullscreen="true"></iframe>`;
    }
    function copyCode() {
        const codeArea = document.getElementById('resCode');
        codeArea.select();
        document.execCommand('copy');
        
        const status = document.getElementById('copyStatus');
        status.style.display = 'block';
        setTimeout(() => { status.style.display = 'none'; }, 2000);
    }
    window.onload = () => update();
</script>
</body>
</html>
