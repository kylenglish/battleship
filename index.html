<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор Sea Battle</title>
    <style>
        :root { --main: #00d4ff; }
        body { font-family: sans-serif; background: #0a192f; color: white; display: flex; gap: 20px; padding: 20px; margin: 0; height: 100vh; }
        .panel { width: 380px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--main); overflow-y: auto; }
        .preview { flex-grow: 1; background: #000; border-radius: 15px; overflow: hidden; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #aaa; }
        input, select, textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #333; background: #1a2a3a; color: white; margin-top: 5px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .check-group { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 15px; }
        .check-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .check-row input { width: auto; margin: 0; }
        button { width: 100%; padding: 12px; background: var(--main); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:var(--main); text-align:center; margin-top:0;">Редактор "Морской бой"</h2>
    
    <label>Заголовок игры:</label>
    <input type="text" id="t" value="МОРСКОЙ БОЙ" oninput="update()">

    <div class="row">
        <div style="flex:1">
            <label>Цвет обводки:</label>
            <input type="color" id="c" value="#00d4ff" oninput="update()">
        </div>
        <div style="flex:1">
            <label>Цвет текста:</label>
            <input type="color" id="fColor" value="#ffffff" oninput="update()">
        </div>
    </div>

    <label>Масштаб поля:</label>
    <input type="range" id="zoom" min="0.4" max="1.5" step="0.05" value="1" oninput="update()">

    <div class="check-group">
        <div class="check-row">
            <input type="checkbox" id="neonT" checked onchange="update()">
            <label style="margin:0">Неон для ТЕКСТА</label>
        </div>
        <div class="check-row">
            <input type="checkbox" id="neonB" checked onchange="update()">
            <label style="margin:0">Неон для ОБВОДКИ</label>
        </div>
    </div>

    <label>Слова/URL (горизонталь):</label>
    <textarea id="x" rows="2" oninput="update()">I, You, She, We, They</textarea>

    <label>Слова/URL (вертикаль):</label>
    <textarea id="y" rows="2" oninput="update()">play, go, sleep</textarea>

    <label>Кол-во целей и URL картинки цели:</label>
    <div class="row">
        <input type="number" id="s" value="3" style="width:60px" oninput="update()">
        <input type="text" id="targetImg" placeholder="URL картинки цели" oninput="update()">
    </div>

    <button onclick="copyCode()">СКОПИРОВАТЬ КОД ДЛЯ GENIALLY</button>
</div>

<div class="preview" id="previewContainer"></div>

<script>
    function getData() {
        return {
            t: document.getElementById('t').value,
            x: document.getElementById('x').value.split(',').map(s => s.trim()),
            y: document.getElementById('y').value.split(',').map(s => s.trim()),
            c: document.getElementById('c').value,
            s: parseInt(document.getElementById('s').value),
            targetImg: document.getElementById('targetImg').value,
            neonT: document.getElementById('neonT').checked,
            neonB: document.getElementById('neonB').checked,
            fColor: document.getElementById('fColor').value,
            zoom: document.getElementById('zoom').value
        };
    }

    function update() {
        const data = btoa(unescape(encodeURIComponent(JSON.stringify(getData()))));
        const url = `https://kylenglish.github.io/battleship/play.html?data=${data}`;
        document.getElementById('previewContainer').innerHTML = `<iframe src="${url}"></iframe>`;
    }

    function copyCode() {
        const url = document.querySelector('iframe').src;
        const code = `<iframe src="${url}" width="100%" height="600px" style="border:0;" allowfullscreen="true"></iframe>`;
        navigator.clipboard.writeText(code);
        alert("Код для Genially скопирован!");
    }

    window.onload = update;
</script>

</body>
</html>
