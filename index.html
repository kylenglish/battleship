<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор Sea Battle</title>
    <style>
        :root { --main: #00d4ff; }
        body { font-family: sans-serif; background: #0a192f; color: white; display: flex; gap: 20px; padding: 20px; margin: 0; height: 100vh; }
        .panel { width: 380px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--main); overflow-y: auto; }
        .preview { flex-grow: 1; background: #000; border-radius: 15px; overflow: hidden; }
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #aaa; }
        input, select, textarea { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #333; background: #1a2a3a; color: white; margin-top: 5px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; background: var(--main); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
        .mode-settings { background: rgba(0,212,255,0.1); padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 3px solid var(--main); }
    </style>
</head>
<body>

<div class="panel">
    <h2 style="color:var(--main); text-align:center; margin-top:0;">Редактор "Морской бой"</h2>
    
    <label>Режим игры:</label>
    <select id="mode" onchange="toggleModes(); update()">
        <option value="classic">Classic (устный)</option>
        <option value="writing">Writing (письменный)</option>
        <option value="challenge">Challenge (на время/ходы)</option>
        <option value="computer">Against computer</option>
    </select>

  <div id="writingOpt" class="mode-settings" style="display:none">
    <label>Ответы (каждый ответ с новой строки):</label>
    <textarea id="answers" rows="5" oninput="update()" placeholder="I play&#10;You play&#10;She plays..."></textarea>
    <small style="display:block; margin-top:5px; font-size:0.7rem; color: #888;">
        Заполняйте по порядку: сначала весь первый ряд (слева направо), затем второй и т.д.
    </small>
</div>

    <div id="challengeOpt" class="mode-settings" style="display:none">
        <label>Тип ограничения:</label>
        <select id="challengeType" onchange="update()">
            <option value="time">Таймер (секунды)</option>
            <option value="moves">Количество ходов</option>
        </select>
        <label>Лимит:</label>
        <input type="number" id="challengeLimit" value="30" oninput="update()">
    </div>

    <label>Вид игры:</label>
    <select id="gameType" onchange="toggleGameType(); update()">
        <option value="solo">Индивидуальный</option>
        <option value="team">Командный</option>
    </select>

    <div id="teamOpt" class="mode-settings" style="display:none">
        <label>Количество команд (2-5):</label>
        <input type="number" id="teamCount" min="2" max="5" value="2" oninput="update()">
    </div>

    <hr style="margin-top:20px; border-color:#333;">

    <label>Заголовок игры:</label>
    <input type="text" id="t" value="МОРСКОЙ БОЙ" oninput="update()">
    
    <div class="row">
        <div style="flex:1"><label>Цвет:</label><input type="color" id="c" value="#00d4ff" oninput="update()"></div>
        <div style="flex:1"><label>Текст:</label><input type="color" id="fColor" value="#ffffff" oninput="update()"></div>
    </div>

    <label>Слова по X и Y (через запятую):</label>
    <textarea id="x" rows="1" oninput="update()">I, You, She, We</textarea>
    <textarea id="y" rows="1" oninput="update()">play, go, sleep</textarea>
    
    <label>Кол-во объектов и URL картинки:</label>
    <div class="row">
        <input type="number" id="s" value="3" style="width:60px" oninput="update()">
        <input type="text" id="targetImg" placeholder="URL картинки" oninput="update()">
    </div>
    
    <label>Финальный текст:</label>
    <input type="text" id="winT" value="ПОБЕДА!" oninput="update()">

    <button onclick="copyCode()">СКОПИРОВАТЬ КОД</button>
    <textarea id="resCode" rows="3" style="margin-top:10px; font-size:0.7rem; color:#888;" readonly></textarea>
</div>

<div class="preview" id="previewContainer"></div>

<script>
    function toggleModes() {
        const m = document.getElementById('mode').value;
        document.getElementById('writingOpt').style.display = m === 'writing' ? 'block' : 'none';
        document.getElementById('challengeOpt').style.display = m === 'challenge' ? 'block' : 'none';
    }
    function toggleGameType() {
        const t = document.getElementById('gameType').value;
        document.getElementById('teamOpt').style.display = t === 'team' ? 'block' : 'none';
    }

    function getData() {
        return {
            mode: document.getElementById('mode').value,
            answers: document.getElementById('answers').value,
            challengeType: document.getElementById('challengeType').value,
            challengeLimit: parseInt(document.getElementById('challengeLimit').value),
            gameType: document.getElementById('gameType').value,
            teamCount: parseInt(document.getElementById('teamCount').value),
            t: document.getElementById('t').value,
            x: document.getElementById('x').value.split(',').map(s => s.trim()),
            y: document.getElementById('y').value.split(',').map(s => s.trim()),
            c: document.getElementById('c').value,
            s: parseInt(document.getElementById('s').value),
            targetImg: document.getElementById('targetImg').value,
            fColor: document.getElementById('fColor').value,
            winT: document.getElementById('winT').value,
            zoom: 1, neonT: true, neonB: true
        };
    }

    function update(isPreviewMode = false) {
        const data = btoa(unescape(encodeURIComponent(JSON.stringify(getData()))));
        let url = `play.html?data=${data}${isPreviewMode ? "&preview=true" : ""}`;
        document.getElementById('previewContainer').innerHTML = `<iframe src="${url}"></iframe>`;
        document.getElementById('resCode').value = `<iframe src="https://kylenglish.github.io/battleship/${url}" width="100%" height="600px" style="border:0;"></iframe>`;
    }

    function copyCode() {
        const codeArea = document.getElementById('resCode');
        codeArea.select();
        document.execCommand('copy');
        alert("Код скопирован!");
    }
    window.onload = () => { toggleModes(); toggleGameType(); update(); };
</script>
</body>
</html>
